######################################
###      Aegis eventtypes            ###
######################################
#
# Sourcetype-anchored (not index-anchored) so the same eventtypes work
# whether the deployment routes Aegis events to `main`, to a dedicated
# `aegis` index, or to a shared `cisco_ai_defense` index.

[aegis_verdict_all]
search = sourcetype="cisco_ai_defense:aegis_verdict"
#tags = aegis ai_safety cisco_ai_defense_family
description = Every Aegis verdict event (ALLOW / MODIFY / BLOCK / REVIEW).

[aegis_verdict_block]
search = sourcetype="cisco_ai_defense:aegis_verdict" verdict_label=BLOCK
#tags = blocked
description = Aegis verdicts that blocked an agent action or model invocation.

[aegis_verdict_high_severity]
search = sourcetype="cisco_ai_defense:aegis_verdict" severity=HIGH
#tags = critical
description = Aegis verdicts at HIGH severity (PCI HIGH, Prompt Injection HIGH, etc.).
