######################################
###          Aegis tags              ###
######################################
#
# CIM-style tag bindings. The `cisco_ai_defense_family` tag lets SOC
# analysts run unified searches across the Cisco Security Cloud app's
# `cisco_ai_defense:*` sourcetype family plus Aegis verdicts in one go:
#   `tag=cisco_ai_defense_family severity=HIGH`

[eventtype=aegis_verdict_all]
aegis = enabled
ai_safety = enabled
cisco_ai_defense_family = enabled

[eventtype=aegis_verdict_block]
blocked = enabled

[eventtype=aegis_verdict_high_severity]
critical = enabled
